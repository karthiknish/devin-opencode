name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Bump version and publish to npm
    runs-on: ubuntu-latest
    # Skip pushes made by the workflow itself (version bump commits)
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v5
        with:
          # Need full history and write access for the version bump commit
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run typecheck

      # Bump the patch version and commit it back to main.
      # The [skip ci] in the commit message prevents re-triggering this workflow.
      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> "$GITHUB_ENV"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      # Uses OIDC trusted publishing — no NPM_TOKEN needed.
      # Requires trusted publisher configured on npmjs.com:
      # https://www.npmjs.com/package/opencode-devin-plugin/access
      - name: Publish
        run: npm publish --provenance --access public
