name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run typecheck

      # Skip if the version in package.json is already published on npm.
      - name: Check if version is new
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view opencode-devin-plugin version 2>/dev/null || echo "none")
          echo "local=$LOCAL_VERSION published=$PUBLISHED_VERSION"
          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "new=false"
            echo "new=false" >> "$GITHUB_OUTPUT"
          else
            echo "new=true"
            echo "new=true" >> "$GITHUB_OUTPUT"
          fi

      # Uses OIDC trusted publishing — no NPM_TOKEN needed.
      # Requires trusted publisher configured on npmjs.com:
      # https://www.npmjs.com/package/opencode-devin-plugin/access
      - name: Publish
        if: steps.check.outputs.new == 'true'
        run: npm publish --provenance --access public
