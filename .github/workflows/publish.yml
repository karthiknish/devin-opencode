name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm run typecheck

      # Uses OIDC trusted publishing — no NPM_TOKEN needed.
      # Requires trusted publisher configured on npmjs.com:
      # https://www.npmjs.com/package/opencode-devin-plugin/access
      - run: npm publish --provenance --access public
